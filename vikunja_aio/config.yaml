name: "Vikunja All-in-One"
version: "2.2.2.1"
slug: "vikunja_aio"
description: "Vikunja (API + Frontend) running on SQLite"
url: "https://vikunja.io"
startup: application
boot: auto
init: false
arch:
  - aarch64
  - amd64
  - armv7
ports:
  3456/tcp: 3456
map:
  - config:rw
options:
  PublicURL: "http://homeassistant.local:3456"
  EnableRegistration: true
  MailerEnabled: false
  MailerHost: ""
  MailerPort: 587
  MailerUsername: ""
  MailerPassword: ""
  MailerFromEmail: ""
schema:
  PublicURL: str
  EnableRegistration: bool
  MailerEnabled: bool
  MailerHost: str?
  MailerPort: int?
  MailerUsername: str?
  MailerPassword: password?
  MailerFromEmail: str?
